name: Weekly Database Backup

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 4am UTC
  workflow_dispatch:        # Allow manual trigger from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      DB_URL: postgresql://postgres.pkjlnjsswoadftkseffo@aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client-17

      - name: Dump schema
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --schema-only -f schema.sql

      - name: Dump data
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --data-only -f data.sql

      - name: Upload backup
        uses: actions/upload-artifact@v4.6.2
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            schema.sql
            data.sql
          retention-days: 90
