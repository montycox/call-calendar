name: Weekly Database Backup

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 4am UTC
  workflow_dispatch:        # Allow manual trigger from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      DB_URL: postgresql://postgres.pkjlnjsswoadftkseffo@aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Dump schema
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pg_dump "$DB_URL" --schema-only -f schema.sql

      - name: Dump data
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pg_dump "$DB_URL" --data-only -f data.sql

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            schema.sql
            data.sql
          retention-days: 90
